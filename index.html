<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Be U – Human Layer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
</script>
<style>
body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
color:#222;
}

button{
background:#4CAF50;
color:white;
border:none;
padding:15px 25px;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin-top:20px;
}
</style>

</head>

<body>

<div class="container">
<h2>Crear cuenta o entrar</h2>

<input id="email" placeholder="Tu email">
<br><br>

<input id="password" type="password" placeholder="Contraseña">
<br><br>

<button onclick="registrarUsuario()">Registrarse</button>

<button onclick="loginUsuario()">Entrar</button>

<hr>

<h2>Reflexionar una decisión</h2>

<textarea id="decision" placeholder="¿Qué decisión estás considerando?" rows="4" cols="40"></textarea>

<br><br>

<textarea id="reflexion" placeholder="Escribe tu reflexión..." rows="4" cols="40"></textarea>

<br><br>

<button onclick="guardarDecision()">Guardar decisión</button>
<h1>Be U</h1>

<h3>Human Layer</h3>

<p>
La calidad de tu vida depende de la calidad de tus decisiones.
</p>

<p>
Esta aplicación te ayuda a reflexionar antes de tomar decisiones importantes.
</p>

<button onclick="alert('Pronto podrás registrar tu decisión con Human Layer')">
Reflexionar una decisión
</button>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL = "https://sjyidyymmeasjdrwldsd.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIs..."
const { createClient } = supabase
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY)
async function registrarUsuario() {
const email = document.getElementById("email").value
const password = document.getElementById("password").value
const { data, error } = await supabaseClient.auth.signUp({
email: email,
password: password
})

if(error){
alert(error.message)
}else{
alert("Usuario registrado. Revisa tu email.")
}

}

async function loginUsuario() {

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const { data, error } = await supabaseClient.auth.signInWithPassword({
email: email,
password: password
})

if(error){
alert(error.message)
}else{
alert("Sesión iniciada correctamente")
}

}

async function guardarDecision() {

const decision = document.getElementById("decision").value
const reflexion = document.getElementById("reflexion").value

const { data: { user } } = await supabaseClient.auth.getUser()

if(!user){
alert("Debes iniciar sesión")
return
}

const { error } = await supabaseClient
.from("decisions")
.insert([
{
user_id: user.id,
decision_text: decision,
reflection: reflexion
}
])

if(error){
alert("Error guardando decisión")
}else{
alert("Decisión guardada")
}

}

</script>
</body>
</html>
