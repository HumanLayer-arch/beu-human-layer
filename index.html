<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#f4f1ea"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Be U"/>
  <meta name="description" content="Decide desde tu mejor version — Human Layer v3"/>

  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="icons/icon-192.png"/>

  <title>Be U</title>

  <style>
    /* ── BASE ───────────────────────── */
    :root {
      --bg: #f4f1ea;
      --card: #ffffff;
      --ink: #1c1a16;
      --green: #1e3a30;
      --border: rgba(0,0,0,.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    #root {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── SCREENS ───────────────────── */
    .screen { display: none; flex-direction: column; }
    .screen.active { display: flex; }

    /* ── ONBOARDING ───────────────── */
    #screen-onboarding {
      background: var(--green);
      color: white;
      padding: 40px 20px;
      justify-content: space-between;
      min-height: 100vh;
    }

    .ob-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .ob-body {
      opacity: .8;
      line-height: 1.5;
    }

    .ob-footer {
      display: flex;
      justify-content: space-between;
      margin-top: 30px;
    }

    .btn-ob {
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-ob-next {
      background: white;
      color: var(--green);
    }

    .btn-ob-skip {
      background: transparent;
      color: rgba(255,255,255,.6);
    }

    /* ── APP ───────────────────────── */
    .app-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: white;
      font-weight: 700;
    }

    .app-body {
      padding: 20px;
    }

    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid var(--border);
    }

    .card-title {
      font-weight: 700;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-bottom: 10px;
      font-family: inherit;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      background: var(--green);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:disabled {
      opacity: .5;
    }

    /* ── RESULT ───────────────────── */
    .result {
      margin-top: 20px;
      padding: 16px;
      background: #faf8f4;
      border-radius: 10px;
      border: 1px solid var(--border);
      line-height: 1.5;
    }
  </style>
</head>

<body>
<div id="root">

  <!-- ONBOARDING -->
  <div id="screen-onboarding" class="screen active">
    <div>
      <div class="ob-title">No necesitas decidir mejor</div>
      <div class="ob-body">
        La calidad de tus decisiones depende de desde donde decides.
      </div>
    </div>

    <div class="ob-footer">
      <button class="btn-ob btn-ob-skip" onclick="OB.skip()">Omitir</button>
      <button class="btn-ob btn-ob-next" onclick="OB.next()">Siguiente</button>
    </div>
  </div>

  <!-- APP -->
  <div id="screen-app" class="screen">

    <div class="app-header">Be U</div>

    <div class="app-body">

      <div class="card">
        <div class="card-title">¿Qué decisión tienes en mente?</div>

        <textarea id="decisionInput" rows="5" placeholder="Escribe..."></textarea>

        <button class="btn" id="btnAnalyze" onclick="APP.analyze()">
          Ver lo que pasa
        </button>
      </div>

      <div class="result" id="resultBox" style="display:none;"></div>

    </div>

  </div>

</div>

<script src="hl-engine.js"></script>
<script src="habit.js"></script>
<script src="onboarding.js"></script>
<script src="app.js"></script>

</body>
</html>
