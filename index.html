<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Be U – Human Layer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f4ef;--bg2:#eee9e0;--bg3:#ffffff;
  --fg:#1c1a17;--fg2:#5a5550;--fg3:#9a948c;
  --verde:#2d4a3e;--verde2:#4a7c6b;
  --linea:rgba(28,26,23,0.1);
  --sombra:0 2px 16px rgba(28,26,23,0.08);
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
.app{width:100%;max-width:420px}

/* LOGO */
.logo{display:flex;flex-direction:column;align-items:center;gap:7px;margin-bottom:32px}
.logo-dot{width:9px;height:9px;border-radius:50%;background:var(--verde);animation:pulsar 2.5s ease-in-out infinite}
.logo-dot:nth-child(2){animation-delay:0.5s}
@keyframes pulsar{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.4);opacity:1}}
.logo-label{font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--fg3);margin-top:4px}

/* PANEL */
.panel{background:var(--bg3);border:1px solid var(--linea);border-radius:20px;padding:32px;box-shadow:var(--sombra)}
.panel-titulo{font-family:'Playfair Display',serif;font-size:26px;font-weight:400;margin-bottom:8px;line-height:1.2}
.panel-sub{font-size:14px;color:var(--fg2);margin-bottom:28px;line-height:1.6}

/* TABS */
.tabs{display:flex;background:var(--bg2);border-radius:12px;padding:4px;margin-bottom:28px;gap:4px}
.tab{flex:1;padding:10px;border:none;border-radius:9px;background:transparent;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;color:var(--fg3);cursor:pointer;transition:all 0.2s}
.tab.activo{background:var(--bg3);color:var(--fg);box-shadow:var(--sombra)}

/* FORM */
.grupo{margin-bottom:16px}
label{display:block;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--fg3);margin-bottom:8px;font-weight:500}
input{width:100%;padding:13px 14px;border:1.5px solid var(--linea);border-radius:12px;background:var(--bg);font-family:'Outfit',sans-serif;font-size:15px;color:var(--fg);outline:none;transition:border-color 0.2s,box-shadow 0.2s}
input:focus{border-color:var(--verde2);box-shadow:0 0 0 3px rgba(74,124,107,0.1)}
input::placeholder{color:var(--fg3)}

/* BTN */
.btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;margin-top:20px}
.btn-principal{background:var(--verde);color:#fff;box-shadow:0 4px 14px rgba(45,74,62,0.25)}
.btn-principal:hover{background:var(--verde2);transform:translateY(-1px)}
.btn-principal:disabled{opacity:0.6;transform:none;cursor:not-allowed}

/* ESTADO */
.msg{margin-top:14px;padding:12px 14px;border-radius:10px;font-size:13px;line-height:1.5;display:none}
.msg.ok{background:rgba(45,74,62,0.08);color:var(--verde);border:1px solid rgba(45,74,62,0.15)}
.msg.error{background:rgba(139,69,19,0.07);color:#8b4513;border:1px solid rgba(139,69,19,0.15)}
.msg.visible{display:block}

/* DASHBOARD */
.dashboard{display:none}
.dashboard.visible{display:block}
.bienvenida{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:6px}
.usuario-email{font-size:13px;color:var(--fg3);margin-bottom:24px}
.divider{height:1px;background:var(--linea);margin:24px 0}
.seccion-titulo{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg3);font-weight:500;margin-bottom:12px}
textarea{width:100%;padding:13px 14px;border:1.5px solid var(--linea);border-radius:12px;background:var(--bg);font-family:'Playfair Display',serif;font-size:16px;font-style:italic;color:var(--fg);outline:none;resize:none;transition:border-color 0.2s;line-height:1.5}
textarea:focus{border-color:var(--verde2);box-shadow:0 0 0 3px rgba(74,124,107,0.1)}
textarea::placeholder{color:var(--fg3);font-style:italic}
.btn-cerrar{background:transparent;border:1px solid var(--linea);color:var(--fg2)}
.btn-cerrar:hover{border-color:var(--fg3);background:var(--bg2)}

/* FRASE */
.frase{font-family:'Playfair Display',serif;font-style:italic;font-size:14px;color:var(--fg3);text-align:center;margin-top:24px;line-height:1.6}
</style>
</head>
<body>
<div class="app">
  <!-- LOGO -->
  <div class="logo">
    <div class="logo-dot"></div>
    <div class="logo-dot"></div>
    <div class="logo-label">Human Layer · Be U</div>
  </div>

  <!-- AUTH PANEL -->
  <div class="panel" id="panelAuth">
    <div class="panel-titulo">Bienvenido</div>
    <div class="panel-sub">La calidad de tu vida depende de la calidad de tus decisiones.</div>

    <div class="tabs">
      <button class="tab activo" id="tabRegistro" onclick="cambiarTab('registro')">Crear cuenta</button>
      <button class="tab" id="tabLogin" onclick="cambiarTab('login')">Entrar</button>
    </div>

    <!-- REGISTRO -->
    <div id="formRegistro">
      <div class="grupo">
        <label>Tu nombre</label>
        <input type="text" id="regNombre" placeholder="¿Cómo te llamas?"/>
      </div>
      <div class="grupo">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="tu@email.com"/>
      </div>
      <div class="grupo">
        <label>Contraseña</label>
        <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres"/>
      </div>
      <button class="btn btn-principal" id="btnRegistro" onclick="registrar()">Crear cuenta</button>
      <div class="msg" id="msgRegistro"></div>
    </div>

    <!-- LOGIN -->
    <div id="formLogin" style="display:none">
      <div class="grupo">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="tu@email.com"/>
      </div>
      <div class="grupo">
        <label>Contraseña</label>
        <input type="password" id="loginPassword" placeholder="Tu contraseña"/>
      </div>
      <button class="btn btn-principal" id="btnLogin" onclick="entrar()">Entrar</button>
      <div class="msg" id="msgLogin"></div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="panel dashboard" id="panelDashboard">
    <div class="bienvenida" id="txtBienvenida">Hola</div>
    <div class="usuario-email" id="txtEmail"></div>

    <div class="seccion-titulo">¿Sobre qué reflexionas hoy?</div>
    <textarea id="txtDecision" rows="4" placeholder="Describe la decisión que estás considerando..."></textarea>
    <button class="btn btn-principal" onclick="guardarReflexion()">Guardar reflexión</button>
    <div class="msg" id="msgDashboard"></div>

    <div class="divider"></div>
    <button class="btn btn-cerrar btn-principal" style="margin-top:0" onclick="cerrarSesion()">Cerrar sesión</button>
  </div>

  <p class="frase">"La claridad aparece cuando escuchamos lo que ya sabemos."</p>
</div>

<!-- Supabase JS v2 desde CDN oficial -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="app.js"></script>
</body>
</html>
