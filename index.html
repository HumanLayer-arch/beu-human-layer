<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Be U – Human Layer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ─── RESET ────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ─── TOKENS (idénticos al original + nuevos) ──────────── */
:root{
  --bg:#f7f4ef;--bg2:#eee9e0;--bg3:#ffffff;
  --fg:#1c1a17;--fg2:#5a5550;--fg3:#9a948c;
  --verde:#2d4a3e;--verde2:#4a7c6b;
  --linea:rgba(28,26,23,0.1);
  --sombra:0 2px 16px rgba(28,26,23,0.08);
  --radio:12px;
  --safe-b:env(safe-area-inset-bottom,0px);
}

/* ─── BASE ─────────────────────────────────────────────── */
body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);color:var(--fg);
  min-height:100vh;min-height:100dvh;
  display:flex;align-items:flex-start;justify-content:center;
  padding:24px 16px calc(var(--safe-b) + 32px);
  -webkit-font-smoothing:antialiased;
}
.app{width:100%;max-width:440px}

/* ─── LOGO (igual al original) ─────────────────────────── */
.logo{display:flex;flex-direction:column;align-items:center;gap:7px;margin-bottom:32px}
.logo-dot{width:9px;height:9px;border-radius:50%;background:var(--verde);animation:pulsar 2.5s ease-in-out infinite}
.logo-dot:nth-child(2){animation-delay:0.5s}
@keyframes pulsar{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.4);opacity:1}}
.logo-label{font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--fg3);margin-top:4px}

/* ─── PANEL (igual al original) ────────────────────────── */
.panel{background:var(--bg3);border:1px solid var(--linea);border-radius:20px;padding:32px;box-shadow:var(--sombra);margin-bottom:12px}
.panel-titulo{font-family:'Playfair Display',serif;font-size:26px;font-weight:400;margin-bottom:8px;line-height:1.2}
.panel-sub{font-size:14px;color:var(--fg2);margin-bottom:28px;line-height:1.6}

/* ─── TABS (igual al original) ─────────────────────────── */
.tabs{display:flex;background:var(--bg2);border-radius:var(--radio);padding:4px;margin-bottom:28px;gap:4px}
.tab{flex:1;padding:10px;border:none;border-radius:9px;background:transparent;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;color:var(--fg3);cursor:pointer;transition:all .2s}
.tab.activo{background:var(--bg3);color:var(--fg);box-shadow:var(--sombra)}

/* ─── FORM (igual al original) ─────────────────────────── */
.grupo{margin-bottom:16px}
label{display:block;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--fg3);margin-bottom:8px;font-weight:500}
input{width:100%;padding:13px 14px;border:1.5px solid var(--linea);border-radius:var(--radio);background:var(--bg);font-family:'Outfit',sans-serif;font-size:15px;color:var(--fg);outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;appearance:none}
input:focus{border-color:var(--verde2);box-shadow:0 0 0 3px rgba(74,124,107,0.1)}
input::placeholder{color:var(--fg3)}

/* ─── BOTONES (igual al original + variante ghost) ─────── */
.btn{display:block;width:100%;padding:14px;border:none;border-radius:var(--radio);font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;margin-top:8px;text-align:center}
.btn-principal{background:var(--verde);color:#fff;box-shadow:0 4px 14px rgba(45,74,62,0.25)}
.btn-principal:hover:not(:disabled){background:var(--verde2);transform:translateY(-1px)}
.btn-principal:disabled{opacity:0.6;transform:none;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--linea);color:var(--fg2)}
.btn-ghost:hover{border-color:var(--fg3);background:var(--bg2)}

/* ─── MENSAJES (igual al original) ─────────────────────── */
.msg{margin-top:14px;padding:12px 14px;border-radius:10px;font-size:13px;line-height:1.5;display:none}
.msg.ok{background:rgba(45,74,62,0.08);color:var(--verde);border:1px solid rgba(45,74,62,0.15);display:block}
.msg.error{background:rgba(139,69,19,0.07);color:#8b4513;border:1px solid rgba(139,69,19,0.15);display:block}

/* ─── DIVIDER / SECCIÓN ─────────────────────────────────── */
.divider{height:1px;background:var(--linea);margin:24px 0}
.seccion-titulo{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg3);font-weight:500;margin-bottom:12px}

/* ─── DASHBOARD HEADER ──────────────────────────────────── */
.bienvenida{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:4px}
.usuario-email{font-size:13px;color:var(--fg3);margin-bottom:24px}

/* ─── TEXTAREA (igual al original) ─────────────────────── */
textarea{width:100%;padding:13px 14px;border:1.5px solid var(--linea);border-radius:var(--radio);background:var(--bg);font-family:'Playfair Display',serif;font-size:16px;font-style:italic;color:var(--fg);outline:none;resize:none;transition:border-color .2s;line-height:1.5}
textarea:focus{border-color:var(--verde2);box-shadow:0 0 0 3px rgba(74,124,107,0.1)}
textarea::placeholder{color:var(--fg3);font-style:italic}

/* ─── LOADING ────────────────────────────────────────────── */
.loading{display:none;flex-direction:column;align-items:center;gap:14px;padding:28px 0}
.loading.visible{display:flex}
.loading-dots{display:flex;gap:6px}
.loading-dot{width:7px;height:7px;border-radius:50%;background:var(--verde);animation:rebotar 1.2s ease-in-out infinite}
.loading-dot:nth-child(2){animation-delay:.15s}
.loading-dot:nth-child(3){animation-delay:.3s}
@keyframes rebotar{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
.loading-txt{font-size:13px;color:var(--fg3)}

/* ─── RESULTADO HL ───────────────────────────────────────── */
.resultado{display:none;margin-top:16px}
.resultado.visible{display:block;animation:aparecer .35s ease both}
@keyframes aparecer{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.hl-card{
  background:linear-gradient(135deg,rgba(45,74,62,.04),rgba(74,124,107,.03));
  border:1.5px solid rgba(45,74,62,.12);
  border-radius:16px;padding:22px;
}
.hl-bloque{margin-bottom:16px}
.hl-bloque:last-child{margin-bottom:0}
.hl-etiq{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--verde2);font-weight:600;margin-bottom:6px}
.hl-texto{font-family:'Playfair Display',serif;font-size:16px;font-weight:400;line-height:1.55;color:var(--fg);font-style:italic}
.hl-pregunta .hl-texto{font-style:normal;font-size:15px;color:var(--verde)}
.hl-impacto .hl-texto,
.hl-coherencia .hl-texto{font-style:normal;font-size:14px;color:var(--fg2)}
.hl-sep{height:1px;background:rgba(45,74,62,.08);margin:14px 0}

/* ─── FRASE FOOTER (igual al original) ─────────────────── */
.frase{font-family:'Playfair Display',serif;font-style:italic;font-size:14px;color:var(--fg3);text-align:center;margin-top:20px;line-height:1.6}
</style>
</head>
<body>
<div class="app">

  <!-- LOGO — igual al original -->
  <div class="logo">
    <div class="logo-dot"></div>
    <div class="logo-dot"></div>
    <div class="logo-label">Human Layer · Be U</div>
  </div>

  <!-- ══════════════════════════════════════
       PANEL AUTH — exactamente igual al original
       ══════════════════════════════════════ -->
  <div class="panel" id="panelAuth">
    <div class="panel-titulo">Bienvenido</div>
    <div class="panel-sub">La calidad de tu vida depende de la calidad de tus decisiones.</div>

    <div class="tabs">
      <button class="tab activo" id="tabRegistro" onclick="cambiarTab('registro')">Crear cuenta</button>
      <button class="tab"        id="tabLogin"    onclick="cambiarTab('login')">Entrar</button>
    </div>

    <!-- REGISTRO -->
    <div id="formRegistro">
      <div class="grupo">
        <label for="regNombre">Tu nombre</label>
        <input type="text"     id="regNombre"   placeholder="¿Cómo te llamas?"/>
      </div>
      <div class="grupo">
        <label for="regEmail">Email</label>
        <input type="email"    id="regEmail"    placeholder="tu@email.com" autocomplete="email"/>
      </div>
      <div class="grupo">
        <label for="regPassword">Contraseña</label>
        <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" autocomplete="new-password"/>
      </div>
      <button class="btn btn-principal" id="btnRegistro" onclick="registrar()">Crear cuenta</button>
      <div class="msg" id="msgRegistro"></div>
    </div>

    <!-- LOGIN -->
    <div id="formLogin" style="display:none">
      <div class="grupo">
        <label for="loginEmail">Email</label>
        <input type="email"    id="loginEmail"    placeholder="tu@email.com" autocomplete="email"/>
      </div>
      <div class="grupo">
        <label for="loginPassword">Contraseña</label>
        <input type="password" id="loginPassword" placeholder="Tu contraseña" autocomplete="current-password"/>
      </div>
      <button class="btn btn-principal" id="btnLogin" onclick="entrar()">Entrar</button>
      <div class="msg" id="msgLogin"></div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       PANEL DASHBOARD — evolución del original
       ══════════════════════════════════════ -->
  <div class="panel" id="panelDashboard" style="display:none">

    <div class="bienvenida" id="txtBienvenida">Hola</div>
    <div class="usuario-email" id="txtEmail"></div>

    <!-- Input de decisión -->
    <div class="seccion-titulo">¿Sobre qué reflexionas hoy?</div>
    <textarea id="txtDecision" rows="4" placeholder="Describe la decisión que estás considerando..."></textarea>

    <!-- Botón principal -->
    <button class="btn btn-principal" id="btnAnalizar" onclick="analizarDecision()" style="margin-top:14px">
      Ver lo que pasa
    </button>

    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="loading-dots">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
      </div>
      <div class="loading-txt">Analizando tu reflexión…</div>
    </div>

    <!-- Resultado HL -->
    <div class="resultado" id="resultado">
      <div class="hl-card">

        <div class="hl-bloque">
          <div class="hl-etiq">Reflexión</div>
          <div class="hl-texto" id="hlReflexion"></div>
        </div>

        <div class="hl-sep"></div>

        <div class="hl-bloque">
          <div class="hl-etiq">Insight</div>
          <div class="hl-texto" id="hlInsight"></div>
        </div>

        <div class="hl-sep"></div>

        <div class="hl-bloque hl-impacto">
          <div class="hl-etiq">Impacto</div>
          <div class="hl-texto" id="hlImpacto"></div>
        </div>

        <div class="hl-sep"></div>

        <div class="hl-bloque hl-coherencia">
          <div class="hl-etiq">Coherencia con decisiones anteriores</div>
          <div class="hl-texto" id="hlCoherencia"></div>
        </div>

        <div class="hl-sep"></div>

        <div class="hl-bloque hl-pregunta">
          <div class="hl-etiq">Pregunta para ti</div>
          <div class="hl-texto" id="hlPregunta"></div>
        </div>

      </div>
      <button class="btn btn-ghost" style="margin-top:12px" onclick="resetearReflexion()">Nueva reflexión</button>
    </div>

    <div class="msg" id="msgDashboard"></div>

    <div class="divider"></div>
    <button class="btn btn-ghost" onclick="cerrarSesion()">Cerrar sesión</button>
  </div>

  <p class="frase">"La claridad aparece cuando escuchamos lo que ya sabemos."</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="app.js"></script>
</body>
</html>
