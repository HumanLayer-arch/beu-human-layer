<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#f4f1ea"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Be U"/>
  <meta name="description" content="Decide desde tu mejor version — Human Layer v3"/>

  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="icons/icon-192.png"/>

  <title>Be U</title>

  <style>
    /* ── TOKENS ─────────────────────────────────── /
    :root {
      --bg:         #f4f1ea;
      --bg-card:    #faf8f4;
      --bg-input:   #edeae2;
      --ink:        #1c1a16;
      --ink-2:      #4a4640;
      --ink-3:      #8a8480;
      --green:      #1e3a30;
      --green-2:    #2e5a4a;
      --green-lt:   rgba(30,58,48,.09);
      --amber:      #7a4a12;
      --amber-lt:   rgba(122,74,18,.09);
      --blue:       #1e325a;
      --blue-lt:    rgba(30,50,90,.08);
      --red:        #8a2010;
      --purple:     #3a2060;
      --purple-lt:  rgba(58,32,96,.07);
      --border:     rgba(28,26,22,.1);
      --shadow:     0 2px 12px rgba(28,26,22,.08);
      --shadow-m:   0 6px 24px rgba(28,26,22,.11);
      --r:          16px;
      --r-sm:       10px;
      --safe-t:     env(safe-area-inset-top, 0px);
      --safe-b:     env(safe-area-inset-bottom, 0px);
    }

    / RESET */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100dvh;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    #root {
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>

<body>
<div id="root">

  <!-- ONBOARDING -->
  <div id="screen-onboarding" class="screen">
    <div class="ob-logo">
      <div class="ob-dots">
        <div class="ob-dot"></div>
        <div class="ob-dot"></div>
      </div>
      <div class="ob-name">Be U</div>
    </div>

    <div class="ob-slides">
      <div class="ob-slide active">
        <div class="ob-num">01 / 03</div>
        <div class="ob-title">No necesitas decidir mejor</div>
        <div class="ob-body">La calidad de tus decisiones depende de desde donde decides.</div>
      </div>
    </div>

    <div class="ob-footer">
      <button class="btn-ob btn-ob-skip" onclick="OB.skip()">Omitir</button>
      <button class="btn-ob btn-ob-next" onclick="OB.next()">Siguiente</button>
    </div>
  </div>

  <!-- APP -->
  <div id="screen-app" class="screen">

    <div class="app-header">
      <div class="app-logo">
        <div class="app-logo-name">Be U</div>
      </div>
    </div>

    <div class="app-body">

      <div class="view active">

        <div class="card">
          <div class="card-title">Que decision tienes en mente?</div>

          <textarea id="decisionInput" rows="5" placeholder="Escribe..."></textarea>

          <button class="btn btn-primary" onclick="APP.analyze()">
            Ver lo que pasa
          </button>
        </div>

      </div>

    </div>

  </div>

</div>

<script src="hl-engine.js"></script>
<script src="habit.js"></script>
<script src="onboarding.js"></script>
<script src="app.js"></script>

</body>
</html>
