<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#f7f4ef"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="description" content="Be U – Human Layer. La calidad de tu vida depende de la calidad de tus decisiones."/>
<title>Be U – Human Layer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f4ef;
  --bg2:#f0ece4;
  --bg3:#e8e2d8;
  --bg4:#ffffff;
  --fg:#1c1a17;
  --fg2:#5a5550;
  --fg3:#9a948c;
  --accent:#2d4a3e;
  --accent2:#4a7c6b;
  --accent3:#8fb8a8;
  --warn:#8b4513;
  --line:rgba(28,26,23,0.1);
  --line2:rgba(28,26,23,0.06);
  --shadow:0 2px 20px rgba(28,26,23,0.08);
  --shadow-lg:0 8px 40px rgba(28,26,23,0.12);
  --r:14px;
  --r-lg:20px;
}

html{height:100%;background:var(--bg)}
body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--fg);
  min-height:100vh;
  overflow-x:hidden;
  font-size:15px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}

/* SCREENS */
#root{min-height:100vh}
.screen{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  animation:aparecer 0.4s ease forwards;
}
@keyframes aparecer{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
.contenedor{
  width:100%;max-width:480px;
  margin:0 auto;padding:0 24px;
}

/* TYPOGRAPHY */
.titulo-grande{
  font-family:'Playfair Display',serif;
  font-size:clamp(30px,8vw,46px);
  font-weight:400;
  line-height:1.12;
  letter-spacing:-0.02em;
  color:var(--fg);
}
.titulo-medio{
  font-family:'Playfair Display',serif;
  font-size:clamp(22px,5.5vw,30px);
  font-weight:400;
  line-height:1.2;
  letter-spacing:-0.01em;
}
.titulo-italico{
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size:clamp(16px,4vw,21px);
  font-weight:400;
  color:var(--fg2);
  line-height:1.4;
}
.etiqueta{
  font-size:10px;letter-spacing:0.2em;
  text-transform:uppercase;color:var(--fg3);
  font-weight:500;
}
.cuerpo{font-size:15px;color:var(--fg2);line-height:1.75}
.cuerpo-xs{font-size:13px;color:var(--fg3);line-height:1.6}

/* HL LOGO ANIMADO */
.logo-hl{
  display:flex;flex-direction:column;
  align-items:center;gap:8px;
}
.logo-punto{
  width:9px;height:9px;border-radius:50%;
  background:var(--accent);
  animation:pulsarPunto 2.8s ease-in-out infinite;
}
.logo-punto:nth-child(2){animation-delay:0.5s}
@keyframes pulsarPunto{
  0%,100%{transform:scale(1);opacity:0.6}
  50%{transform:scale(1.4);opacity:1}
}

/* LOGO INTRO GRANDE */
.logo-intro{
  position:relative;
  width:100px;height:100px;
  margin:0 auto;
}
.punto-intro{
  position:absolute;
  width:12px;height:12px;
  border-radius:50%;
  background:var(--accent);
}
.punto-intro.p1{top:20px;left:44px;animation:animP1 2.8s ease-in-out forwards}
.punto-intro.p2{bottom:20px;right:44px;animation:animP2 2.8s ease-in-out forwards}
@keyframes animP1{
  0%{opacity:0;top:44px;left:44px;transform:scale(0)}
  15%{opacity:1;top:44px;left:44px;transform:scale(1)}
  45%{top:10px;left:20px;transform:scale(1.3)}
  70%{top:10px;left:20px;transform:scale(1)}
  90%,100%{top:20px;left:44px;transform:scale(1);opacity:1}
}
@keyframes animP2{
  0%{opacity:0;bottom:44px;right:44px;transform:scale(0)}
  15%{opacity:1;bottom:44px;right:44px;transform:scale(1)}
  45%{bottom:10px;right:20px;transform:scale(1.3)}
  70%{bottom:10px;right:20px;transform:scale(1)}
  90%,100%{bottom:20px;right:44px;transform:scale(1);opacity:1}
}

/* BARRA NAVEGACIÓN */
.nav-superior{
  display:flex;align-items:center;
  justify-content:space-between;
  padding:18px 24px;
  border-bottom:1px solid var(--line2);
  background:var(--bg4);
  position:sticky;top:0;z-index:40;
}
.btn-volver{
  background:none;border:none;
  color:var(--fg2);cursor:pointer;
  font-size:20px;padding:6px;
  border-radius:8px;
  transition:background 0.2s;
}
.btn-volver:hover{background:var(--bg2)}
.nav-titulo{
  font-size:13px;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--fg3);
  font-weight:500;
}
.nav-accion{
  background:none;border:none;
  color:var(--accent);cursor:pointer;
  font-size:13px;font-family:'Outfit',sans-serif;
  font-weight:500;padding:6px;
  transition:opacity 0.2s;
}
.nav-accion:hover{opacity:0.7}

/* BOTONES */
.btn{
  display:block;width:100%;
  padding:15px 24px;
  border:none;border-radius:var(--r);
  font-family:'Outfit',sans-serif;
  font-size:14px;font-weight:500;
  cursor:pointer;
  transition:all 0.2s;text-align:center;
}
.btn-principal{
  background:var(--accent);color:#fff;
  box-shadow:0 4px 16px rgba(45,74,62,0.25);
}
.btn-principal:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(45,74,62,0.3)}
.btn-principal:active{transform:translateY(0)}
.btn-secundario{
  background:var(--bg4);color:var(--fg);
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}
.btn-secundario:hover{border-color:var(--bg3);background:var(--bg2)}
.btn-texto{
  background:transparent;
  color:var(--fg3);border:none;
  font-size:13px;padding:10px;
  width:auto;
}
.btn-texto:hover{color:var(--fg2)}
.btn-sm{padding:10px 18px;font-size:13px;border-radius:10px}

/* INPUTS */
.grupo-input{margin-bottom:20px}
.etiqueta-input{
  display:block;font-size:12px;
  letter-spacing:0.1em;text-transform:uppercase;
  color:var(--fg3);margin-bottom:10px;font-weight:500;
}
textarea, input[type=text], input[type=email], input[type=password]{
  width:100%;
  background:var(--bg4);
  border:1.5px solid var(--line);
  border-radius:var(--r);
  color:var(--fg);
  font-family:'Outfit',sans-serif;
  font-size:15px;
  line-height:1.6;
  padding:14px 16px;
  outline:none;resize:none;
  transition:border-color 0.2s,box-shadow 0.2s;
  box-shadow:var(--shadow);
}
textarea:focus, input:focus{
  border-color:var(--accent2);
  box-shadow:0 0 0 3px rgba(74,124,107,0.12);
}
textarea::placeholder, input::placeholder{color:var(--fg3)}

/* TARJETAS */
.tarjeta{
  background:var(--bg4);
  border:1px solid var(--line2);
  border-radius:var(--r-lg);
  padding:20px;
  margin-bottom:12px;
  box-shadow:var(--shadow);
}
.tarjeta-ghost{
  background:transparent;
  border:1px solid var(--line);
  border-radius:var(--r-lg);
  padding:20px;
}

/* EMOCIONES */
.rejilla-emociones{
  display:flex;flex-wrap:wrap;gap:8px;
  margin-top:8px;
}
.etiqueta-emocion{
  padding:9px 16px;border-radius:100px;
  border:1.5px solid var(--line);
  background:var(--bg4);
  color:var(--fg2);
  font-family:'Outfit',sans-serif;
  font-size:13px;font-weight:400;
  cursor:pointer;transition:all 0.2s;
  box-shadow:var(--shadow);
}
.etiqueta-emocion.seleccionada{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
}
.etiqueta-emocion:hover:not(.seleccionada){
  border-color:var(--accent3);
  color:var(--fg);
}

/* BADGES */
.badge{
  display:inline-block;
  padding:4px 10px;border-radius:100px;
  font-size:11px;letter-spacing:0.06em;
  text-transform:uppercase;font-weight:500;
}
.badge-explorando{background:rgba(74,124,107,0.1);color:var(--accent2)}
.badge-decidido{background:rgba(45,74,62,0.1);color:var(--accent)}
.badge-proceso{background:rgba(143,184,168,0.2);color:#3d7a65}
.badge-revisando{background:rgba(139,69,19,0.1);color:var(--warn)}

/* BARRA PROGRESO */
.barra-progreso{
  height:3px;background:var(--bg3);
  border-radius:3px;overflow:hidden;
  margin-bottom:28px;
}
.barra-fill{
  height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:3px;transition:width 0.5s ease;
}

/* ESCALA CLARIDAD */
.escala-claridad{
  display:flex;gap:8px;margin:12px 0;
}
.punto-claridad{
  flex:1;height:44px;
  border-radius:10px;
  border:1.5px solid var(--line);
  background:var(--bg4);
  cursor:pointer;
  font-size:15px;font-weight:500;
  font-family:'Playfair Display',serif;
  color:var(--fg2);
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
  box-shadow:var(--shadow);
}
.punto-claridad.activo{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
  transform:scale(1.05);
}
.punto-claridad:hover:not(.activo){
  border-color:var(--accent3);
}

/* MAPA DE VIDA */
.mapa-vida{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:10px;margin-top:16px;
}
.area-vida{
  background:var(--bg4);
  border:1.5px solid var(--line2);
  border-radius:14px;
  padding:16px 10px;
  text-align:center;
  cursor:pointer;
  transition:all 0.2s;
  box-shadow:var(--shadow);
}
.area-vida:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.area-vida.clara{border-color:var(--accent);background:rgba(45,74,62,0.04)}
.area-vida.reflexionando{border-color:var(--accent3);background:rgba(143,184,168,0.08)}
.area-vida-icono{font-size:22px;margin-bottom:6px}
.area-vida-nombre{font-size:11px;color:var(--fg3);font-weight:500;letter-spacing:0.04em}

/* INSIGHT IA */
.caja-insight{
  background:linear-gradient(135deg,rgba(45,74,62,0.04),rgba(143,184,168,0.06));
  border:1.5px solid rgba(45,74,62,0.15);
  border-radius:var(--r-lg);
  padding:28px;
}
.seccion-insight{margin-bottom:22px}
.seccion-insight:last-child{margin-bottom:0}
.etiqueta-insight{
  font-size:10px;letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--accent2);margin-bottom:8px;
  font-weight:500;
}
.texto-insight{
  font-family:'Playfair Display',serif;
  font-size:18px;font-weight:400;
  line-height:1.55;
  color:var(--fg);
  font-style:italic;
}

/* DIVISOR */
.divisor{height:1px;background:var(--line2);margin:24px 0}

/* MÉTRICAS */
.fila-metrica{
  display:flex;align-items:center;
  justify-content:space-between;
  padding:18px 0;
  border-bottom:1px solid var(--line2);
}
.num-metrica{
  font-family:'Playfair Display',serif;
  font-size:38px;font-weight:400;
  color:var(--accent);
}

/* TIMELINE */
.timeline{position:relative;padding-left:26px}
.timeline::before{
  content:'';position:absolute;
  left:5px;top:10px;bottom:10px;
  width:1px;background:var(--line);
}
.item-timeline{position:relative;margin-bottom:14px}
.item-timeline::before{
  content:'';position:absolute;
  left:-21px;top:22px;
  width:8px;height:8px;
  border-radius:50%;
  background:var(--bg3);
  border:1.5px solid var(--fg3);
}
.item-timeline.activo::before{
  background:var(--accent);border-color:var(--accent);
}

/* CÁMARA */
.area-camara{
  width:100%;aspect-ratio:3/4;
  max-height:380px;
  background:var(--bg2);
  border:1.5px solid var(--line);
  border-radius:var(--r-lg);
  overflow:hidden;
  position:relative;
  display:flex;align-items:center;justify-content:center;
}
.area-camara video, .area-camara canvas, .area-camara img{
  width:100%;height:100%;object-fit:cover;
}
.overlay-camara{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:12px;padding:24px;
}

/* CARGA */
.puntos-carga{
  display:flex;gap:6px;align-items:center;
  justify-content:center;padding:20px;
}
.punto-carga{
  width:7px;height:7px;border-radius:50%;
  background:var(--accent);
  animation:rebotar 1.2s ease-in-out infinite;
}
.punto-carga:nth-child(2){animation-delay:0.15s}
.punto-carga:nth-child(3){animation-delay:0.3s}
@keyframes rebotar{
  0%,60%,100%{transform:translateY(0)}
  30%{transform:translateY(-9px)}
}

/* NAV INFERIOR */
.nav-inferior{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg4);
  border-top:1px solid var(--line2);
  display:flex;z-index:50;
  max-width:480px;margin:0 auto;
  padding-bottom:env(safe-area-inset-bottom,0);
  box-shadow:0 -4px 20px rgba(28,26,23,0.06);
}
.item-nav{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:10px 4px;
  cursor:pointer;border:none;background:none;
  color:var(--fg3);
  font-family:'Outfit',sans-serif;
  font-size:10px;letter-spacing:0.03em;
  font-weight:500;gap:4px;
  transition:color 0.2s;
}
.item-nav.activo{color:var(--accent)}
.item-nav svg{width:20px;height:20px}
.item-nav span.icono{font-size:17px;line-height:1}

/* CONTENIDO SCROLL */
.scroll-contenido{
  flex:1;overflow-y:auto;
  padding:24px 24px 100px;
  max-width:480px;margin:0 auto;width:100%;
}
.scroll-contenido.sin-nav{padding-bottom:32px}

/* PROYECCIONES FUTURO */
.tarjeta-proyeccion{border-radius:16px;padding:22px;margin-bottom:12px}
.proyeccion-crece{
  background:linear-gradient(135deg,rgba(45,74,62,0.06),rgba(143,184,168,0.08));
  border:1.5px solid rgba(45,74,62,0.15);
}
.proyeccion-igual{
  background:linear-gradient(135deg,rgba(139,69,19,0.05),rgba(160,100,60,0.04));
  border:1.5px solid rgba(139,69,19,0.12);
}

/* DOTS ONBOARDING */
.punto-onboarding{
  width:6px;height:6px;border-radius:50%;
  background:var(--bg3);transition:background 0.3s,transform 0.3s;
}
.punto-onboarding.activo{background:var(--accent);transform:scale(1.2)}

/* GRANO SUTIL */
.grano{
  position:fixed;inset:0;pointer-events:none;z-index:200;
  opacity:0.018;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:256px;
}

/* UTILIDADES */
.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}
.mt-16{margin-top:16px}.mt-20{margin-top:20px}.mt-24{margin-top:24px}
.mt-32{margin-top:32px}.mt-40{margin-top:40px}
.mb-4{margin-bottom:4px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}
.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}.mb-24{margin-bottom:24px}
.mb-32{margin-bottom:32px}
.centrado{text-align:center}
.verde{color:var(--accent)}
.flex{display:flex}.gap-8{gap:8px}.gap-12{gap:12px}
.items-center{align-items:center}.justify-between{justify-content:space-between}
.w-full{width:100%}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
</style>
</head>
<body>
<div class="grano"></div>
<div id="root"></div>
<script>
// ===== ESTADO GLOBAL =====
const estado = {
  pantalla: 'cargando',
  pasoOnboarding: 0,
  usuario: null,
  formularioRegistro: {nombre:'',email:'',password:''},
  decisiones: [
    {id:1,titulo:'Cambiar de trabajo',estado:'explorando',fecha:'12 mar',emociones:['incertidumbre','ilusión'],texto:'Llevo 3 años en la misma empresa y siento que he dejado de crecer. Hay una oferta interesante pero supone un salto de riesgo.',claridad_antes:2,claridad_despues:4},
    {id:2,titulo:'Mudarme a otra ciudad',estado:'decidido',fecha:'28 feb',emociones:['esperanza','miedo'],texto:'Barcelona ofrece más oportunidades laborales pero significa alejarme de mi red de apoyo familiar.',claridad_antes:1,claridad_despues:4},
    {id:3,titulo:'Lanzar mi proyecto propio',estado:'en proceso',fecha:'10 feb',emociones:['curiosidad','presión'],texto:'Tengo la idea clara pero el miedo al fracaso me paraliza. No sé si es el momento adecuado.',claridad_antes:3,claridad_despues:4},
  ],
  decisionActual: null,
  pasoReflexion: 0,
  datosReflexion: {},
  insightIA: null,
  cargandoIA: false,
  areasVida: {
    educación:{estado:'clara',icono:'📚'},
    carrera:{estado:'reflexionando',icono:'💼'},
    relaciones:{estado:'clara',icono:'❤️'},
    salud:{estado:'sin explorar',icono:'🌿'},
    ciudad:{estado:'reflexionando',icono:'🌍'},
    propósito:{estado:'reflexionando',icono:'✨'},
    finanzas:{estado:'sin explorar',icono:'💰'},
    red_social:{estado:'sin explorar',icono:'🤝'},
    tiempo:{estado:'sin explorar',icono:'⏳'},
    creatividad:{estado:'clara',icono:'🎨'},
    aprendizaje:{estado:'sin explorar',icono:'🧠'},
    vida_interior:{estado:'reflexionando',icono:'🔮'},
  },
  pasoFuturo: 0,
  fotoCapturada: null,
  navActivo: 'inicio',
  claridad_antes: null,
  claridad_despues: null,
};

// ===== RENDER =====
function render() {
  const root = document.getElementById('root');
  root.innerHTML = '';
  const mapa = {
    cargando: renderCargando,
    onboarding: renderOnboarding,
    registro: renderRegistro,
    inicio: renderInicio,
    nueva: renderNuevaDecision,
    reflexion: renderReflexion,
    insight: renderInsight,
    historial: renderHistorial,
    evolucion: renderEvolucion,
    mapa: renderMapaVida,
    futuro: renderFuturo,
    perfil: renderPerfil,
  };
  const fn = mapa[estado.pantalla] || renderInicio;
  root.appendChild(fn());
}

// ===== PANTALLA DE CARGA =====
function renderCargando() {
  const el = cEl('div', 'screen');
  el.innerHTML = `
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:36px;padding:40px">
      <div class="logo-intro">
        <div class="punto-intro p1"></div>
        <div class="punto-intro p2"></div>
      </div>
      <div class="centrado">
        <div class="etiqueta mb-8" style="letter-spacing:0.25em">Human Layer</div>
        <div class="titulo-italico">Be U</div>
      </div>
      <div class="puntos-carga">
        <div class="punto-carga"></div>
        <div class="punto-carga"></div>
        <div class="punto-carga"></div>
      </div>
    </div>
  `;
  setTimeout(()=>{estado.pantalla='onboarding';render();},2600);
  return el;
}

// ===== ONBOARDING =====
const pasosOnboarding = [
  {titulo:'Bienvenido a Be U',cuerpo:'Este espacio te ayuda a pensar con claridad sobre las decisiones que influyen en tu vida.'},
  {titulo:'Human Layer',cuerpo:'La tecnología no debe decidir por ti.\n\nDebe ayudarte a comprender mejor tus decisiones.'},
  {titulo:'Tu mejor versión',cuerpo:'El objetivo es sencillo.\n\nAyudarte a decidir desde tu mejor versión.',final:true},
];

function renderOnboarding() {
  const paso = pasosOnboarding[estado.pasoOnboarding];
  const el = cEl('div','screen');
  el.innerHTML = `

function toggleEmocion(e){

async function generarInsight(){
  estado.pantalla='insight';
  estado.cargandoIA=true;
  estado.insightIA=null;
  render();

  const contexto = `
Decisión: ${estado.decisionActual.titulo}

Por qué importa: ${estado.datosReflexion.por_que||''}
Emociones: ${(estado.datosReflexion.emociones||[]).join(', ')}
Si no hacía nada: ${estado.datosReflexion.nada||''}
Consejo a un amigo: ${estado.datosReflexion.amigo||''}
Alineación con futuro: ${estado.datosReflexion.futuro||''}
Claridad antes: ${estado.claridad_antes||'?'}/5
Claridad después: ${estado.claridad_despues||'?'}/5
  `.trim();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:`Eres un asistente diseñado para ayudar a las personas a reflexionar sobre decisiones importantes de su vida.
Nunca debes decirle al usuario qué hacer.
Tu función es reflejar sus pensamientos, identificar emociones y hacer preguntas que aumenten su claridad.
Responde siempre en español.
Responde ÚNICAMENTE con un objeto JSON válido, sin markdown ni backticks, con estas claves exactas:
- reflexion: 2-3 frases empáticas que reflejen lo que la persona ha compartido
- insight: 2-3 frases sobre patrones o dinámicas que observas
- pregunta: una sola pregunta abierta y suave que aumente la claridad`,
        messages:[{role:'user',content:contexto}]
      })
    });
    const datos = await res.json();
    const texto = datos.content?.map(b=>b.text||'').join('')||'';
    const limpio = texto.replace(/```json|```/g,'').trim();
    estado.insightIA = JSON.parse(limpio);
  } catch(e){
    estado.insightIA = {
      reflexion:'Estás reflexionando sobre algo que claramente te importa. La honestidad con la que has respondido muestra un nivel real de autoconciencia.',
      insight:'Parece haber una tensión entre lo que te atrae y lo que parece seguro o cierto. Esa tensión es precisamente donde suele vivir la claridad.',
      pregunta:'Si el miedo no fuera parte de esta ecuación, ¿qué te diría tu instinto?'
    };
  }

  // Guardar decisión
  estado.decisionActual.emociones = estado.datosReflexion.emociones||[];
  estado.decisionActual.texto = estado.datosReflexion.por_que||'';
  estado.decisionActual.claridad_antes = estado.claridad_antes;
  estado.decisionActual.claridad_despues = estado.claridad_despues;
  estado.decisiones.unshift({...estado.decisionActual});
  estado.cargandoIA = false;
  render();
}

}

function reflexionarArea(area){

}

// ===== EVOLUCIÓN =====
function renderEvolucion(){
  const total = estado.decisiones.length;
  const decididas = estado.decisiones.filter(d=>d.estado==='decidido'||d.estado==='en proceso').length;
  const todasEmociones = estado.decisiones.flatMap(d=>d.emociones||[]);
  const emocionTop = todasEmociones.length
    ? todasEmociones.sort((a,b)=>todasEmociones.filter(v=>v===b).length-todasEmociones.filter(v=>v===a).length)[0]
    : '—';
  const claridades = estado.decisiones.filter(d=>d.claridad_antes&&d.claridad_despues);
  const gananciaClaridad = claridades.length
    ? (claridades.reduce((acc,d)=>(acc+(d.claridad_despues-d.claridad_antes)),0)/claridades.length).toFixed(1)
    : '—';

  const el = cEl('div','screen');
  el.innerHTML = `
    <div class="nav-superior">
      <button class="btn-volver" onclick="navegar('inicio')">←</button>
      <span class="nav-titulo">Mi evolución</span>
      <span style="width:44px"></span>
    </div>
    <div class="scroll-contenido">
      <div class="titulo-medio mb-8">Tu camino de reflexión</div>
      <p class="cuerpo mb-32">Una visión serena de cómo estás creciendo a través de tus decisiones.</p>

      <div class="fila-metrica">
        <div><div class="etiqueta mb-4">Reflexiones realizadas</div><div class="cuerpo-xs">Decisiones que has traído a la claridad</div></div>
        <div class="num-metrica">${total}</div>
      </div>
      <div class="fila-metrica">
        <div><div class="etiqueta mb-4">Decisiones clarificadas</div><div class="cuerpo-xs">Pasadas de explorar a decidir</div></div>
        <div class="num-metrica">${decididas}</div>
      </div>
      <div class="fila-metrica">
        <div><div class="etiqueta mb-4">Ganancia de claridad media</div><div class="cuerpo-xs">Puntos ganados por reflexión</div></div>
        <div class="num-metrica" style="font-size:28px">+${gananciaClaridad}</div>
      </div>
      <div class="fila-metrica">
        <div><div class="etiqueta mb-4">Emoción más presente</div><div class="cuerpo-xs">La que aparece con más frecuencia</div></div>
        <div style="font-family:'Playfair Display',serif;font-size:20px;font-style:italic;color:var(--accent);text-align:right;max-width:130px">${emocionTop}</div>
      </div>
      <div class="fila-metrica">
        <div><div class="etiqueta mb-4">Áreas de vida exploradas</div><div class="cuerpo-xs">Dimensiones con reflexión activa</div></div>
        <div class="num-metrica">${Object.values(estado.areasVida).filter(a=>a.estado!=='sin explorar').length}</div>
      </div>

      <div class="divisor"></div>
      <div class="tarjeta-ghost centrado">
        <div class="etiqueta mb-12">Un recordatorio</div>
        <p class="titulo-italico">"El crecimiento no siempre es visible. A veces vive en las preguntas que dejaste de evitar."</p>
      </div>
    </div>
    ${navInferior()}
  `;
  return el;
}

// ===== FUTURO =====
function renderFuturo(){
  const pasos = ['intro','camara','analizando','proyeccion'];
  const paso = pasos[estado.pasoFuturo];
  if(paso==='intro') return renderFuturoIntro();
  if(paso==='camara') return renderFuturoCamara();
  if(paso==='analizando') return renderFuturoAnalizando();
  if(paso==='proyeccion') return renderFuturoProyeccion();
  return renderFuturoIntro();
}

let streamCamara = null;
function renderFuturoCamara(){
  const el = cEl('div','screen');
  el.innerHTML = `
    <div class="nav-superior">
      <button class="btn-volver" onclick="detenerCamara()">←</button>
      <span class="nav-titulo">Escaneo facial</span>
      <span style="width:44px"></span>

      <p class="cuerpo centrado mb-20">Centra tu rostro en el marco y mira naturalmente.</p>
      <div class="area-camara" id="areaCamara">

          <div style="font-size:36px;opacity:0.4">📷</div>
          <p class="cuerpo-xs centrado">Iniciando cámara...</p>
        </div>
      </div>
      <canvas id="canvasFoto" style="display:none"></canvas>
      <div class="mt-24 flex gap-12" style="justify-content:center">
        <button class="btn btn-secundario btn-sm" onclick="detenerCamara()" style="width:120px">Cancelar</button>
        <button class="btn btn-principal btn-sm" onclick="capturarFoto()" style="width:160px">Tomar foto</button>
      </div>
      <p class="cuerpo-xs centrado mt-16" style="opacity:0.5">No se guarda ningún dato sin tu consentimiento.</p>
    </div>
  `;
  return el;
}
async function iniciarCamara(){
  const area = document.getElementById('areaCamara');
  const overlay = document.getElementById('overlayCamara');
  if(!area) return;
  try {
    streamCamara = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}}});
    const video = document.createElement('video');
    video.autoplay=true;video.playsInline=true;video.srcObject=streamCamara;
    overlay?.remove();area.appendChild(video);
  } catch(e){
    if(overlay) overlay.innerHTML=`
      <div style="font-size:32px">🚫</div>
      <p class="cuerpo-xs centrado" style="max-width:220px">Acceso a cámara denegado. Por favor, permite el acceso a la cámara e inténtalo de nuevo.</p>
      <button class="btn btn-secundario btn-sm mt-12" onclick="detenerCamara()">Volver</button>
    `;
  }
}
function capturarFoto(){
  const canvas = document.getElementById('canvasFoto');
  const video = document.querySelector('#areaCamara video');
  if(canvas&&video){
    canvas.width=video.videoWidth||640;
    canvas.height=video.videoHeight||480;
    canvas.getContext('2d').drawImage(video,0,0);
    estado.fotoCapturada = canvas.toDataURL('image/jpeg',0.8);
  } else {
    estado.fotoCapturada='placeholder';
  }
  detenerStream();
  estado.pasoFuturo=2;render();
  setTimeout(()=>{estado.pasoFuturo=3;render();},2800);
}
function detenerStream(){
  if(streamCamara){streamCamara.getTracks().forEach(t=>t.stop());streamCamara=null;}
}
function detenerCamara(){
  detenerStream();estado.pasoFuturo=0;render();
}

// ===== NAV INFERIOR =====
function navInferior(){
  const items=[
    {id:'inicio',icono:'⊙',etiqueta:'Inicio'},
    {id:'historial',icono:'◎',etiqueta:'Decisiones'},
    {id:'mapa',icono:'◈',etiqueta:'Mapa'},
    {id:'evolucion',icono:'◇',etiqueta:'Evolución'},
    {id:'futuro',icono:'◉',etiqueta:'Futuro'},
  ];
  return `<nav class="nav-inferior">
    ${items.map(item=>`
      <button class="item-nav${estado.navActivo===item.id?' activo':''}" onclick="navegar('${item.id}')">
        <span class="icono">${item.icono}</span>
        <span>${item.etiqueta}</span>
      </button>
    `).join('')}
  </nav>`;
}

// ===== NAVEGACIÓN =====
function navegar(pantalla){
  detenerStream();
  estado.navActivo=pantalla;
  estado.pantalla=pantalla;
  render();
  window.scrollTo(0,0);
}

// ===== HELPER =====
function cEl(tag, cls){
  const el = document.createElement(tag);
  el.className=cls;
  return el;
}

// ===== ARRANQUE =====
render();
document.addEventListener('touchstart',e=>{if(e.touches.length>1)e.preventDefault();},{passive:false});
</script>
